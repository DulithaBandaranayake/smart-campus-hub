# H2 Persistent File Database Configuration for demo
spring.datasource.url=jdbc:h2:file:./data/smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.jdbcx.JdbcDataSource
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Settings for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
